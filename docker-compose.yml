# Inventory & Order Management System — full stack orchestration.
# Bring everything up with:  docker compose up --build
# Credentials come from the .env file (copy .env.example → .env).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not published to the host by default; only the backend reaches it over
    # the private compose network. Uncomment to inspect from the host.
    # ports:
    #   - "5432:5432"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static bundle. The browser calls the backend directly,
        # so this must be reachable from the user's browser (host machine).
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  pgdata:
    driver: local
